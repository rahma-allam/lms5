kind = "web"
previewPath = "/"
title = "LMS Platform"
version = "1.0.0"
id = "artifacts/lms-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20963

[services.development]
run = "pnpm --filter @workspace/lms-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lms-platform", "run", "build" ]
publicDir = "artifacts/lms-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20963"
BASE_PATH = "/"
