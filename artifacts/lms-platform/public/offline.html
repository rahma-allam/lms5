<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>غير متصل بالإنترنت</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      background: #f8f7ff;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 4px 24px rgba(109, 40, 217, 0.08), 0 1px 4px rgba(0,0,0,0.06);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .icon-wrap {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }

    .icon-wrap svg {
      width: 40px;
      height: 40px;
      color: #7c3aed;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e1b4b;
      margin-bottom: 12px;
      line-height: 1.3;
    }

    p {
      font-size: 0.95rem;
      color: #6b7280;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 32px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ddd6fe;
      animation: pulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 12px rgba(109, 40, 217, 0.3);
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .status {
      margin-top: 24px;
      font-size: 0.8rem;
      color: #9ca3af;
    }

    #online-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f87171;
    }

    .status-dot.online { background: #34d399; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 3l4.5 4.5M21 3l-4.5 4.5M12 8.25v.008M8.25 12H3m18 0h-5.25M12 15.75v.008M6.343 17.657A9 9 0 0 0 12 21a9 9 0 0 0 5.657-3.343M3.515 6.343A9 9 0 0 1 12 3a9 9 0 0 1 8.485 3.343" />
      </svg>
    </div>

    <h1>أنت غير متصل بالإنترنت</h1>
    <p>
      لا يمكن تحميل الصفحة الآن.<br />
      تحقق من اتصالك بالإنترنت ثم حاول مجدداً.
    </p>

    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <button class="btn" onclick="tryReload()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
      إعادة المحاولة
    </button>

    <div class="status">
      <span id="online-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">غير متصل</span>
      </span>
    </div>
  </div>

  <script>
    function tryReload() {
      window.location.reload();
    }

    function updateStatus() {
      const dot = document.getElementById("status-dot");
      const text = document.getElementById("status-text");
      if (navigator.onLine) {
        dot.className = "status-dot online";
        text.textContent = "متصل — جارٍ إعادة التوجيه…";
        setTimeout(() => window.location.reload(), 800);
      } else {
        dot.className = "status-dot";
        text.textContent = "غير متصل";
      }
    }

    window.addEventListener("online", updateStatus);
    window.addEventListener("offline", updateStatus);
    updateStatus();
  </script>
</body>
</html>
